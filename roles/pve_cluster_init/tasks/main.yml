---
# =============================================================================
# pve_cluster_init – Idempotentes Cluster-Setup
#
# Ablauf:
#   1. Primary Node: pvecm create <name> (falls Cluster noch nicht existiert)
#   2. Primary propagiert seine IP an alle anderen Play-Hosts
#   3. Secondary Nodes:
#      a) Root-SSH-Key des Ansible-Controllers auf Primary deployen
#      b) Primary-Root-Key auf Secondary deployen (pvecm braucht root-zu-root SSH)
#      c) pvecm add <primary_ip> --link0 <eigene_ip>
#
# T-09 Fix: ansible.builtin.expect entfernt.
#   Grund: pvecm add --use_ssh ist interaktiv und fragt nach root-Passwort.
#   Besser: root SSH-Keys vor dem Join beidseitig deployen.
#   pvecm add funktioniert dann ohne Passwort-Prompt und ohne expect.
# =============================================================================

- name: "cluster | Aktuellen Cluster-Status pruefen"
  ansible.builtin.command:
    cmd: pvecm status
  register: _pvecm_status
  changed_when: false
  failed_when:  false

- name: "cluster | Zustandsfacts setzen"
  ansible.builtin.set_fact:
    _cluster_exists:  "{{ 'Name:' in _pvecm_status.stdout }}"
    _node_in_cluster: "{{ pve_cluster_name in _pvecm_status.stdout }}"

# =============================================================================
# Primary Node: Cluster erstellen
# =============================================================================
- name: "cluster | [PRIMARY] Cluster erstellen"
  when:
    - pve_cluster_primary | default(false) | bool
    - not (_cluster_exists | bool)
  block:
    - name: "cluster | pvecm create {{ pve_cluster_name }}"
      ansible.builtin.command:
        cmd: >-
          pvecm create {{ pve_cluster_name }}
          --link0 {{ pve_node_ip }}
          {%- if pve_cluster_link1_ip is defined and pve_cluster_link1_ip | length > 0 %}
          --link1 {{ pve_cluster_link1_ip }}
          {%- endif %}
      register: _pvecm_create
      changed_when: _pvecm_create.rc == 0

    - name: "cluster | Warten bis Quorate: Yes"
      ansible.builtin.command:
        cmd: pvecm status
      register: _cluster_ready
      until:   "'Quorate: Yes' in _cluster_ready.stdout"
      retries: 20
      delay:   5
      changed_when: false

# =============================================================================
# Primary IP an alle Nodes weitergeben
# =============================================================================
- name: "cluster | Primary-IP als delegierter Fact propagieren"
  ansible.builtin.set_fact:
    pve_cluster_primary_ip: "{{ pve_node_ip }}"
  delegate_to:    "{{ item }}"
  delegate_facts: true
  loop:           "{{ ansible_play_hosts }}"
  when: pve_cluster_primary | default(false) | bool

# =============================================================================
# SSH-Key-Vorbereitung fuer pvecm add (ersetzt expect-basierter Ansatz)
#
# pvecm add kommuniziert intern via SSH als root zwischen den Nodes.
# Damit kein Passwort-Prompt erscheint, muessen die SSH-Keys vorab
# beidseitig deployed werden:
#   - Ansible-Controller-Key -> Primary root authorized_keys
#   - Primary root public-key -> Secondary root authorized_keys
#   - Secondary root public-key -> Primary root authorized_keys
#
# Voraussetzung: pve_root_ssh_keys enthaelt den Ansible-Controller-Key
# =============================================================================
- name: "cluster | [SECONDARY] SSH-Schluessel-Austausch vorbereiten"
  when:
    - not (pve_cluster_primary | default(false) | bool)
    - not (_node_in_cluster | bool)
    - pve_cluster_primary_ip is defined
    - pve_cluster_primary_ip | length > 0
  block:

    - name: "cluster | Root-SSH-Keypair auf Secondary erzeugen (falls nicht vorhanden)"
      ansible.builtin.command:
        cmd: ssh-keygen -t ed25519 -N '' -f /root/.ssh/id_ed25519
        creates: /root/.ssh/id_ed25519

    - name: "cluster | Public-Key des Secondary einlesen"
      ansible.builtin.slurp:
        src: /root/.ssh/id_ed25519.pub
      register: _secondary_pubkey

    - name: "cluster | Root-SSH-Keypair auf Primary erzeugen (falls nicht vorhanden)"
      ansible.builtin.command:
        cmd: ssh-keygen -t ed25519 -N '' -f /root/.ssh/id_ed25519
        creates: /root/.ssh/id_ed25519
      delegate_to: "{{ pve_cluster_primary_ip }}"

    - name: "cluster | Public-Key des Primary einlesen"
      ansible.builtin.slurp:
        src: /root/.ssh/id_ed25519.pub
      register: _primary_pubkey
      delegate_to: "{{ pve_cluster_primary_ip }}"

    - name: "cluster | Secondary-Key auf Primary authorisieren"
      ansible.posix.authorized_key:
        user:  root
        state: present
        key:   "{{ _secondary_pubkey.content | b64decode | trim }}"
      delegate_to: "{{ pve_cluster_primary_ip }}"

    - name: "cluster | Primary-Key auf Secondary authorisieren"
      ansible.posix.authorized_key:
        user:  root
        state: present
        key:   "{{ _primary_pubkey.content | b64decode | trim }}"

    - name: "cluster | SSH-Fingerprint des Primary in known_hosts aufnehmen"
      ansible.builtin.known_hosts:
        name:  "{{ pve_cluster_primary_ip }}"
        state: present
        key:   "{{ lookup('pipe', 'ssh-keyscan -t ed25519 ' ~ pve_cluster_primary_ip) }}"

# =============================================================================
# Secondary Nodes: Cluster beitreten
# =============================================================================
- name: "cluster | [SECONDARY] Node dem Cluster hinzufuegen"
  when:
    - not (pve_cluster_primary | default(false) | bool)
    - not (_node_in_cluster | bool)
    - pve_cluster_primary_ip is defined
    - pve_cluster_primary_ip | length > 0
  block:
    - name: "cluster | pvecm add {{ pve_cluster_primary_ip }}"
      ansible.builtin.command:
        cmd: >-
          pvecm add {{ pve_cluster_primary_ip }}
          --link0 {{ pve_node_ip }}
          {%- if pve_cluster_link1_ip is defined and pve_cluster_link1_ip | length > 0 %}
          --link1 {{ pve_cluster_link1_ip }}
          {%- endif %}
      register: _pvecm_add
      changed_when: "'cluster joined' in _pvecm_add.stdout or _pvecm_add.rc == 0"

    - name: "cluster | Warten bis Node in pvecm nodes sichtbar"
      ansible.builtin.command:
        cmd: pvecm nodes
      register: _pvecm_nodes
      until:   inventory_hostname in _pvecm_nodes.stdout
      retries: 30
      delay:   5
      changed_when: false
      delegate_to: >-
        {{ ansible_play_hosts
           | map('extract', hostvars)
           | selectattr('pve_cluster_primary', 'defined')
           | selectattr('pve_cluster_primary', 'equalto', true)
           | map(attribute='inventory_hostname')
           | first }}

# =============================================================================
# Finaler Status
# =============================================================================
- name: "cluster | Status ausgeben"
  ansible.builtin.command:
    cmd: pvecm status
  register: _final_status
  changed_when: false
  failed_when:  false

- name: "cluster | Status anzeigen"
  ansible.builtin.debug:
    msg: "{{ _final_status.stdout_lines }}"
