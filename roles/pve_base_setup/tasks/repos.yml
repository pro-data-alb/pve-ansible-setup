---
- name: "repos | Enterprise-Repo deaktivieren"
  ansible.builtin.replace:
    path:    /etc/apt/sources.list.d/pve-enterprise.list
    regexp:  '^(deb .+)'
    replace: '# \1'
  when: not pve_use_subscription

- name: "repos | Ceph Enterprise-Repo deaktivieren"
  ansible.builtin.replace:
    path:    /etc/apt/sources.list.d/ceph.list
    regexp:  '^(deb .+)'
    replace: '# \1'
  when: not pve_use_subscription
  ignore_errors: true

- name: "repos | No-Subscription-Repo für PVE 9 (Trixie) konfigurieren"
  ansible.builtin.copy:
    dest:    /etc/apt/sources.list.d/pve-no-subscription.list
    content: |
      deb http://download.proxmox.com/debian/pve trixie pve-no-subscription
    mode: "0644"
  when: not pve_use_subscription

- name: "repos | Debian Trixie Quellen sicherstellen"
  ansible.builtin.copy:
    dest:    /etc/apt/sources.list
    content: |
      deb http://deb.debian.org/debian trixie main contrib non-free-firmware
      deb http://deb.debian.org/debian trixie-updates main contrib non-free-firmware
      deb http://security.debian.org/debian-security trixie-security main contrib non-free-firmware
    mode: "0644"

- name: "repos | APT-Cache aktualisieren"
  ansible.builtin.apt:
    update_cache:      true
    cache_valid_time:  3600
