---
# =============================================================================
# handlers/main.yml
# =============================================================================

- name: lldpd neu starten
  ansible.builtin.systemd:
    name:    lldpd
    state:   restarted
    enabled: true

- name: ssh neu starten
  ansible.builtin.systemd:
    name:    ssh
    state:   restarted
    enabled: true

- name: udev reload
  # T-02 fix: Regeln laden UND sofort auf bestehende net-Devices anwenden.
  # Ohne 'trigger' greifen neue udev-Regeln erst nach dem nächsten Reboot.
  block:
    - name: udev reload | Regelwerk neu laden
      ansible.builtin.command:
        cmd: udevadm control --reload-rules
      changed_when: true

    - name: udev reload | Regeln auf bestehende Netzwerk-Devices anwenden
      ansible.builtin.command:
        cmd: udevadm trigger --action=add --subsystem-match=net
      changed_when: true
