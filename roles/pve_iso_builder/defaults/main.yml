---
# =============================================================================
# pve_iso_builder – defaults/main.yml  (Ansible Prio 2 – niedrigste Priorität)
#
# WICHTIG: Diese Defaults sind technische Fallbacks / FAIL-Guards.
# Alle produktiven Werte SOLLEN aus group_vars/ oder host_vars/ kommen.
#
# HIERARCHIE für pve_disk_list:
#   Prio  2  roles/pve_iso_builder/defaults/main.yml  → "__UNDEFINED__" (FAIL-Guard)
#   Prio  8  group_vars/all.yml                        → ["sda","sdb"]
#   Prio 10  group_vars/proxmox_nodes.yml              → ["sda","sdb"]
#   Prio 12  group_vars/pve_cluster_*.yml              → cluster-spezifisch
#   Prio 12  host_vars/<hostname>.yml                  → node-spezifisch
#
# Alle node-spezifischen Vars SOLLEN vom Playbook-Loop via hostvars[item]
# übergeben und per set_fact (tasks/main.yml) auf iso_builder gesetzt werden.
# =============================================================================

# -- ISO-Steuerung ------------------------------------------------------------
pve_iso_download:        true
pve_iso_validate_answer: true
pve_answer_fetch_from:   "iso"   # iso | partition | http

# -- Node-Identität (werden vom Loop überschrieben) ---------------------------
_node_name: "undefined-node"
_node_fqdn: "undefined-node.example.com"

# -- Netzwerk -----------------------------------------------------------------
# PFLICHT: Leere Strings → firstboot.sh bricht mit fail() ab
pve_node_ip:          ""
pve_node_cidr_prefix: "24"
pve_node_gw:          ""
pve_node_dns:         ""

# pve_nic_aliases: KEINE leere Liste als Default!
# Eine leere Liste würde den bond0-Guard in firstboot.sh.j2 auslösen.
# → Muss zwingend in host_vars/<node>.yml definiert sein.
pve_nic_aliases: []

# -- Optionale Bond-Flags -----------------------------------------------------
pve_bond1_enabled: false
pve_bond2_enabled: false
pve_bond0_mtu:     1500

# -- Storage-Bridges ----------------------------------------------------------
pve_storage_bridges: []

# -- Corosync -----------------------------------------------------------------
pve_cluster_link1_ip: ""

# -- Disk – FAIL-GUARD -------------------------------------------------------
# "__UNDEFINED__" als Sentinel: der Assert in tasks/main.yml bricht den
# Build sofort ab wenn dieser Wert NICHT durch group_vars/ oder host_vars/
# überschrieben wurde.
#
# Erlaubte Werte: nicht-leere Liste, z. B. ["sda","sdb"]
# Zu setzen in (Reihenfolge höchste → niedrigste Prio):
#   1. host_vars/<node>.yml
#   2. group_vars/pve_cluster_*.yml
#   3. group_vars/proxmox_nodes.yml
#   4. group_vars/all.yml
pve_disk_list: "__UNDEFINED__"

# -- Proxmox Subscription -----------------------------------------------------
pve_use_subscription: false

# -- SSH-Härtung (Phase 2 firstboot) -----------------------------------------
pve_ssh_permit_root_login: "prohibit-password"
pve_ssh_password_auth:     "no"

# -- lldpd (Phase 5 firstboot) ------------------------------------------------
lldpd_configure:          true
lldpd_port_id_subtype:    "macaddress"
lldpd_system_description: "Proxmox VE Node"

# -- Zusatzpakete (Phase 4 firstboot) -----------------------------------------
pve_extra_packages:
  - lldpd

# -- NTP-Server (Phase 5 firstboot) -------------------------------------------
pve_ntp_servers: []
