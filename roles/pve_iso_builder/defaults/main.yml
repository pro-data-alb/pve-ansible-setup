---
# =============================================================================
# pve_iso_builder – defaults/main.yml
#
# WICHTIG: Diese Defaults sind Fallbacks.
# Alle node-spezifischen Vars MÜSSEN vom Playbook-Loop via hostvars[item]
# übergeben und per set_fact (tasks/main.yml) auf iso_builder gesetzt werden.
# Fehlt ein Wert hier → Ansible wirft einen undefined-Fehler beim set_fact.
# =============================================================================

# -- ISO-Steuerung ------------------------------------------------------------
pve_iso_download:        true
pve_iso_validate_answer: true
pve_answer_fetch_from:   "iso"   # iso | partition | http

# -- Node-Identität (werden vom Loop überschrieben) ---------------------------
_node_name:              "undefined-node"
_node_fqdn:              "undefined-node.example.com"

# -- Netzwerk -----------------------------------------------------------------
# PFLICHT: Leere Strings → firstboot.sh bricht mit fail() ab
pve_node_ip:             ""
pve_node_cidr_prefix:    "24"
pve_node_gw:             ""
pve_node_dns:            ""

# pve_nic_aliases: KEINE leere Liste als Default!
# Eine leere Liste würde den bond0-Guard in firstboot.sh.j2 auslösen
# und den ISO-Build mit FATAL abbrechen – gewolltes Verhalten.
# → Muss zwingend in host_vars/<node>.yml definiert sein.
pve_nic_aliases:         []

# -- Optionale Bond-Flags -----------------------------------------------------
pve_bond1_enabled:       false
pve_bond2_enabled:       false
pve_bond0_mtu:           1500

# -- Storage-Bridges ----------------------------------------------------------
pve_storage_bridges:     []

# -- Corosync -----------------------------------------------------------------
pve_cluster_link1_ip:    ""

# -- Disk ---------------------------------------------------------------------
pve_disk_list:           []

# -- Proxmox Subscription -----------------------------------------------------
# false  → No-Subscription-Repo wird aktiviert, Enterprise-Repo deaktiviert
# true   → Enterprise-Repos bleiben aktiv (Subscription-Key in answer.toml)
# Kann global in group_vars/pve_nodes.yml oder per Node in host_vars/ gesetzt werden.
pve_use_subscription:    false

# -- SSH-Härtung (Phase 2 firstboot) -----------------------------------------
pve_ssh_permit_root_login:  "prohibit-password"   # prohibit-password | yes | no
pve_ssh_password_auth:      "no"                  # yes | no

# -- lldpd (Phase 5 firstboot) ------------------------------------------------
lldpd_configure:            true
lldpd_port_id_subtype:      "macaddress"           # macaddress | ifname
lldpd_system_description:   "Proxmox VE Node"

# -- Zusatzpakete (Phase 4 firstboot, immer installiert: ifenslave ethtool) ---
# lldpd ist hier als Default enthalten; wird in Phase 5 konfiguriert.
pve_extra_packages:
  - lldpd

# -- NTP-Server (Phase 5 firstboot) -------------------------------------------
# Leer lassen → kein NTP-Block wird gerendert (systemd-timesyncd Defaults bleiben)
# Beispiel: ["0.de.pool.ntp.org", "1.de.pool.ntp.org"]
pve_ntp_servers:            []
