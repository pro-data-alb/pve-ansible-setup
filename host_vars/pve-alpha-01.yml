---
# =============================================================================
# host_vars – pve-alpha-01
# =============================================================================

# -- Management / Corosync ----------------------------------------------------
pve_node_ip:          "192.168.10.11"
pve_node_cidr_prefix: "24"
pve_node_gw:          "192.168.10.1"
pve_node_dns:         "192.168.10.1"

# Optionaler zweiter Corosync-Link (z. B. dediziertes Crossover-Netz)
pve_cluster_link1_ip: ""

# -- bond0 – Management-Bond (vmbr0 / Corosync) -------------------------------
pve_bond0_slaves:
  - "eno1"
  - "eno2"

# -- bond1 – Storage-Bond (NFS / iSCSI via VLANs) -----------------------------
pve_bond1_enabled: true
pve_bond1_slaves:
  - "ens1f0"
  - "ens1f1"

pve_storage_bridges:
  - iface:   "vmbr10"
    vlan_id: 10
    address: "10.10.10.11"
    netmask: "24"
    comment: "NFS Storage"
  - iface:   "vmbr11"
    vlan_id: 11
    address: "10.10.11.11"
    netmask: "24"
    comment: "iSCSI-1"
  - iface:   "vmbr12"
    vlan_id: 12
    address: "10.10.12.11"
    netmask: "24"
    comment: "iSCSI-2"

# -- bond2 – VM-Traffic-Bond (vmbrData / SDN VLAN-aware) ----------------------
pve_bond2_enabled: true
pve_bond2_slaves:
  - "ens2f0"
  - "ens2f1"

# Disk-Setup (Node-spezifisch überschreiben falls nötig)
# pve_disk_list: ["sda", "sdb"]
