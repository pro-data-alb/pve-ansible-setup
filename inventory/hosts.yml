---
# =============================================================================
# Inventory – Proxmox VE Cluster
#
# Struktur:
#   iso_builder         – lokaler Host für ISO-Erzeugung
#   proxmox_nodes       – alle PVE-Nodes (parent group)
#     pve_cluster_alpha – Cluster "alpha" (pve-alpha-01..03)
#     pve_cluster_beta  – Cluster "beta"  (pve-beta-01..02)
#
# VARIABLEN-QUELLEN (höhere Prio überschreibt niedrigere):
#   group_vars/all.yml                   Prio  8  globaler Fallback
#   group_vars/proxmox_nodes.yml         Prio 10  alle PVE-Nodes
#   group_vars/pve_cluster_alpha.yml     Prio 12  Cluster alpha
#   group_vars/pve_cluster_beta.yml      Prio 12  Cluster beta
#   host_vars/<hostname>.yml             Prio 12  Node-spezifisch
#
# KEINE inline vars: Blöcke in diesem File!
# Cluster-Variablen (pve_cluster_name, pve_domain, pve_disk_list, ...)
# gehören in group_vars/pve_cluster_<name>.yml – dort sind sie versionierbar,
# kommentierbar und hierarchisch korrekt eingeordnet.
# =============================================================================
all:
  children:

    # -- ISO-Bau (lokal) -------------------------------------------------------
    iso_builder:
      hosts:
        localhost:
          ansible_connection: local
          ansible_python_interpreter: /usr/bin/python3

    # -- Alle PVE-Nodes --------------------------------------------------------
    proxmox_nodes:
      children:

        # -- Cluster alpha -----------------------------------------------------
        # Variablen: group_vars/pve_cluster_alpha.yml
        pve_cluster_alpha:
          hosts:
            pve-alpha-01:
              ansible_host:        "192.168.10.11"
              pve_cluster_primary: true
            pve-alpha-02:
              ansible_host:        "192.168.10.12"
              pve_cluster_primary: false
            pve-alpha-03:
              ansible_host:        "192.168.10.13"
              pve_cluster_primary: false

        # -- Cluster beta ------------------------------------------------------
        # Variablen: group_vars/pve_cluster_beta.yml
        pve_cluster_beta:
          hosts:
            pve-beta-01:
              ansible_host:        "192.168.20.11"
              pve_cluster_primary: true
            pve-beta-02:
              ansible_host:        "192.168.20.12"
              pve_cluster_primary: false
