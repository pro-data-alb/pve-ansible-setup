---
# =============================================================================
# Inventory – Proxmox VE Cluster
# Struktur:
#   iso_builder         – lokaler Host für ISO-Erzeugung
#   proxmox_nodes       – alle PVE-Nodes (parent group)
#     pve_cluster_alpha – Cluster "alpha" (pve-alpha-01..03)
#     pve_cluster_beta  – Cluster "beta"  (pve-beta-01..02)
# host_vars/<hostname>.yml – Node-spezifische Variablen (IPs, Bond-Slaves …)
# =============================================================================
all:
  children:

    # -- ISO-Bau (lokal) -------------------------------------------------------
    iso_builder:
      hosts:
        localhost:
          ansible_connection: local

    # -- Alle PVE-Nodes --------------------------------------------------------
    proxmox_nodes:
      children:

        # -- Cluster alpha -----------------------------------------------------
        pve_cluster_alpha:
          vars:
            pve_cluster_name: "alpha"
            pve_domain:       "alpha.proxmox.local"
          hosts:
            pve-alpha-01:
              ansible_host:        "192.168.10.11"
              pve_cluster_primary: true
            pve-alpha-02:
              ansible_host:        "192.168.10.12"
              pve_cluster_primary: false
            pve-alpha-03:
              ansible_host:        "192.168.10.13"
              pve_cluster_primary: false

        # -- Cluster beta ------------------------------------------------------
        pve_cluster_beta:
          vars:
            pve_cluster_name: "beta"
            pve_domain:       "beta.proxmox.local"
          hosts:
            pve-beta-01:
              ansible_host:        "192.168.20.11"
              pve_cluster_primary: true
            pve-beta-02:
              ansible_host:        "192.168.20.12"
              pve_cluster_primary: false
