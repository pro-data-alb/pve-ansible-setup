---
# =============================================================================
# 00_setup_distrobox.yml
# Richtet Distrobox auf dem Ansible-Controller-Host ein
# =============================================================================
- name: "Setup Distrobox"
  hosts: localhost
  become: true
  gather_facts: true

  vars_files:
    - group_vars/all.yml

  tasks:

    # -- 1. Voraussetzungen prüfen --------------------------------------------
    - name: "distrobox | podman oder docker prüfen"
      ansible.builtin.command:
        cmd: "{{ item }}"
      loop:
        - podman --version
        - docker --version
      register: _container_runtime
      changed_when: false
      failed_when: false

    - name: "distrobox | Mindestens eine Container-Runtime muss vorhanden sein"
      ansible.builtin.fail:
        msg: "Weder podman noch docker gefunden – bitte vorher installieren."
      when:
        - _container_runtime.results[0].rc != 0
        - _container_runtime.results[1].rc != 0

    # -- 2. Distrobox installieren -------------------------------------------
    - name: "distrobox | Paket installieren"
      ansible.builtin.apt:
        name: distrobox
        state: present

    # -- 3. apt update --------------------------------------------------------
    - name: "distrobox | apt-cache aktualisieren"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    # -- 4. Distrobox-Container erstellen ------------------------------------
    - name: "distrobox | Container '{{ distrobox_container_name }}' erstellen"
      ansible.builtin.command:
        cmd: >-
          distrobox create
          --name {{ distrobox_container_name }}
          --image {{ distrobox_image }}
          --home {{ distrobox_home }}
      args:
        creates: "{{ ansible_env.HOME }}/.local/share/containers/storage/volumes/{{ distrobox_container_name }}"
      register: _distrobox_create
      changed_when: _distrobox_create.rc == 0

    # -- 5. Distrobox-Container starten --------------------------------------
    - name: "distrobox | Container '{{ distrobox_container_name }}' starten"
      ansible.builtin.command:
        cmd: "distrobox enter {{ distrobox_container_name }} -- true"
      register: _distrobox_enter
      changed_when: false
      failed_when: _distrobox_enter.rc != 0
