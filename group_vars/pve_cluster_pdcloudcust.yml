---
# =============================================================================
# group_vars/pve_cluster_pdcloudcust.yml – Cluster: pro-data-cloud-cust
# Nodes: pd-proxmox04 / pd-proxmox05 / pd-proxmox06  (Ansible Prio 12)
#
# VARIABLEN-HIERARCHIE:
#   Überschreibt:  group_vars/proxmox_nodes.yml (Prio 10)
#                  group_vars/all.yml           (Prio  8)
#   Überschrieben durch: host_vars/<hostname>.yml
#
# REGEL: Nur Werte eintragen, die vom Cluster-Default in proxmox_nodes.yml
#        oder all.yml ABWEICHEN. Identische Werte nicht duplizieren!
# =============================================================================

# -----------------------------------------------------------------------------
# CLUSTER-IDENTITÄT
# -----------------------------------------------------------------------------
pve_cluster_name: "pro-data-cloud-cust"
pve_domain:       "pro-data.cloud"

# -----------------------------------------------------------------------------
# ISO-QUELLE – dieser Cluster nutzt PVE 9.0 (abweichend von all.yml 9.1)
# Überschreibt all.yml
# -----------------------------------------------------------------------------
pve_iso_url:        "https://enterprise.proxmox.com/iso/proxmox-ve_9.0-1.iso"
pve_iso_filename:   "proxmox-ve_9.0-1.iso"
pve_iso_output_dir: "/opt/pve-isos"

# -----------------------------------------------------------------------------
# SICHERHEIT – Cluster-eigener Hash + SSH-Key
# PFLICHT: ansible-vault encrypt_string verwenden!
# Überschreibt all.yml
# -----------------------------------------------------------------------------
pve_root_password_hashed: "CHANGEME_yescrypt_hash"
pve_root_ssh_keys:
  - "ssh-ed25519 AAAA... ansible@pro-data.cloud"

# -----------------------------------------------------------------------------
# DISK-SETUP – Cluster-Norm
# pd-proxmox04/05/06 haben je eine SSD auf sda
# Einzelne Nodes können in host_vars/ abweichen.
# -----------------------------------------------------------------------------
pve_disk_list:
  - "sda"

pve_disk_filesystem:   "zfs"
pve_disk_zfs_raid:     "mirror"   # ⚠️ Single-Disk: auf "raid0" ändern oder 2. Disk zufügen!
pve_disk_zfs_ashift:   12
pve_disk_zfs_compress: "lz4"

# Disk-Filter (Fallback falls pve_disk_list nicht greift – sollte nicht passieren)
pve_disk_filter_key:   "vendor"
pve_disk_filter_value: "SAMSUNG"

# -----------------------------------------------------------------------------
# INSTALLER-VERHALTEN
# Überschreibt all.yml
# -----------------------------------------------------------------------------
pve_reboot_on_error:     true
pve_first_boot_ordering: "default"
