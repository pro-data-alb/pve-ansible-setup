# =============================================================================
# group_vars/pve_cluster_pdcloudcust.yml
# Cluster: pro-data-cloud-cust  |  Nodes: pd-proxmox04/05/06
# =============================================================================

# --- Cluster-Identität -------------------------------------------------------
pve_cluster_name: "pro-data-cloud-cust"
pve_domain:       "pro-data.cloud"

# --- Proxmox VE Source-ISO (PVE 9) -------------------------------------------
pve_iso_url:      "https://enterprise.proxmox.com/iso/proxmox-ve_9.0-1.iso"
pve_iso_filename: "proxmox-ve_9.0-1.iso"
pve_iso_output_dir: "/opt/pve-isos"

# --- Installer Sprache / Region ----------------------------------------------
pve_keyboard:  "de"
pve_country:   "de"
pve_timezone:  "Europe/Berlin"
pve_mailto:    "admin@pro-data.cloud"

# --- Sicherheit (PFLICHT – KEIN Default!) ------------------------------------
# Erzeugen: mkpasswd --method=yescrypt
# In Vault auslagern: ansible-vault encrypt_string '...' --name pve_root_password_hashed
pve_root_password_hashed: "CHANGEME_yescrypt_hash"
pve_root_ssh_keys:
  - "ssh-ed25519 AAAA... ansible@pro-data.cloud"

# --- Disk-Setup (ZFS RAID-1) -------------------------------------------------
pve_disk_filesystem:   "zfs"
pve_disk_zfs_raid:     "raid1"
pve_disk_zfs_ashift:   12
pve_disk_zfs_compress: "lz4"
# Disk-Filter: alle SSDs von Samsung (Beispiel)
pve_disk_filter_key:   "vendor"
pve_disk_filter_value: "SAMSUNG"

# --- Installer-Verhalten -----------------------------------------------------
pve_reboot_on_error:     true
pve_reboot_mode:         "reboot"
pve_first_boot_ordering: "default"
pve_iso_download:        true
pve_iso_validate_answer: true
pve_answer_fetch_from:   "iso"
